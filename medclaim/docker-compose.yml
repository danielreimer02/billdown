version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ../lcd_analysis:/data/lcd_analysis
      - ../ptp_analysis:/data/ptp_analysis
      - ../pfs_analysis:/data/pfs_analysis
      - ../mue_analysis:/data/mue_analysis
    environment:
      - DATABASE_URL=postgresql://medclaim:medclaim@postgres:5432/medclaim
      - SECRET_KEY=dev-secret-change-in-production
      - ENVIRONMENT=development
      - LCD_DATA_DIR=/data/lcd_analysis/all_data
      - PTP_DATA_DIR=/data/ptp_analysis/extracted
      - MUE_DATA_DIR=/data/mue_analysis/extracted
      - PFS_DATA_DIR=/data/pfs_analysis
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_REGION=us-east-1
      - S3_ENDPOINT_URL=http://localstack:4566
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medclaim
      POSTGRES_PASSWORD: medclaim
      POSTGRES_DB: medclaim
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medclaim"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=us-east-1
      - PERSISTENCE=1
    volumes:
      - localstack_data:/var/lib/localstack
      - ./infra/localstack-init.sh:/etc/localstack/init/ready.d/init-s3.sh

volumes:
  postgres_data:
  localstack_data:
